<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Tag Generator | CALSEVA</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;900&family=Montserrat:wght@400;500;600;700&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#000000",
                        secondary: "#5f5e5e",
                        surface: "#fcfcfc",
                        "surface-container": "#f3f3f3",
                        outline: "#E5E7EB",
                        accent: "#0052FF"
                    },
                    fontFamily: {
                        headline: ["League Spartan", "sans-serif"],
                        body: ["Montserrat", "sans-serif"],
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        input:focus { outline: none !important; border-color: black !important; ring: 0 !important; }
        
        /* Strict Industrial Styling */
        * { border-radius: 0px !important; }
        
        .view-hidden { display: none; }
        .tab-active { border-bottom: 3px solid black; color: black; font-weight: 900; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Print Layout for Tags (A4 Grid) */
        @media print {
            .no-print { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            #print-area { display: grid !important; }
            .print-grid { 
                display: grid !important; 
                grid-template-columns: repeat(2, 1fr); 
                gap: 15px; 
                padding: 15mm;
            }
            .tag-card-print {
                border: 1.5px solid black;
                padding: 10px;
                font-family: Arial, sans-serif;
                page-break-inside: avoid;
                position: relative;
                min-height: 50mm;
            }
            .tag-header-container {
                display: flex;
                align-items: center;
                gap: 10px;
                border-bottom: 1.5px solid black;
                padding-bottom: 6px;
                margin-bottom: 8px;
            }
            .tag-logo-print {
                width: 45px;
                height: 45px;
                object-fit: contain;
                flex-shrink: 0;
            }
            .tag-header-text {
                text-align: center;
                flex-grow: 1;
                font-weight: bold;
                font-size: 10pt;
                line-height: 1.2;
                text-transform: uppercase;
            }
            .tag-row {
                display: flex;
                font-size: 8.5pt;
                line-height: 1.8;
                border-bottom: 0.5px solid #ddd;
            }
            .tag-label { width: 42%; font-weight: bold; }
            .tag-val { width: 58%; font-family: 'Courier New', monospace; font-weight: bold; }
        }
    </style>
</head>
<body class="bg-surface text-black font-body selection:bg-black selection:text-white overflow-x-hidden">

    <!-- Print Template Section (Hidden on Screen) -->
    <div id="print-area" class="hidden print-grid"></div>

    <!-- Global Toast -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 text-[10px] font-bold uppercase tracking-widest shadow-2xl opacity-0 pointer-events-none transition-all z-[100]">
        System Updated
    </div>

    <!-- Header -->
    <header class="bg-white/90 backdrop-blur-xl sticky top-0 z-50 border-b border-outline px-6 h-16 flex justify-between items-center no-print">
        <div class="flex items-center gap-2">
            <a href="Dashboard.html" class="hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors active:scale-95 duration-150 p-2 rounded-full">
            <button class="hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors active:scale-95 duration-150 p-2 rounded-full">
            <span class="material-symbols-outlined text-black dark:text-white" data-icon="arrow_back">arrow_back</span>
            </button></a>
            <h1 class="font-headline text-xl font-black tracking-tighter uppercase">CALSEVA</h1>
        </div>
        <div class="flex gap-6 h-full">
            <button onclick="switchView('form')" id="nav-form" class="text-[10px] uppercase tracking-widest font-bold text-slate-400 h-full tab-active transition-all">Generator</button>
            <button onclick="switchView('vault')" id="nav-vault" class="text-[10px] uppercase tracking-widest font-bold text-slate-400 h-full transition-all">Vault</button>
        </div>
    </header>

    <!-- FORM VIEW -->
    <main id="view-form" class="max-w-xl mx-auto px-6 py-10 pb-32 space-y-10 animate-in no-print">
        <div class="space-y-2">
            <span class="bg-black text-white text-[9px] font-black px-2 py-0.5 tracking-widest uppercase">Tag Module v4.2</span>
            <h2 class="font-headline text-4xl font-black uppercase tracking-tighter leading-none">Record Entry</h2>
            <p class="text-xs text-slate-400 font-medium">Input technical calibration data for physical tagging.</p>
        </div>

        <div class="bg-white border-2 border-black p-8 space-y-8 shadow-xl">
            <div class="space-y-1">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500">Instrument Tag No.</label>
                <input id="tagNo" type="text" class="w-full bg-slate-50 border-b-2 border-black p-4 font-bold text-sm placeholder:text-slate-200" placeholder="CSV-TAG-0000">
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500">Calibration Done On</label>
                    <input id="doneOn" type="date" class="w-full bg-slate-50 border-b-2 border-black p-4 font-bold text-sm">
                </div>
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500">Calibration Due On</label>
                    <input id="dueOn" type="date" class="w-full bg-slate-50 border-b-2 border-black p-4 font-bold text-sm">
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500">Calibration Done By</label>
                <input id="doneBy" type="text" class="w-full bg-slate-50 border-b-2 border-black p-4 font-bold text-sm placeholder:text-slate-200" placeholder="Lead Technician Name">
            </div>

            <button onclick="saveTag()" class="w-full bg-black text-white py-5 font-headline font-black text-sm uppercase tracking-[0.4em] active:scale-95 transition-all flex items-center justify-center gap-3">
                Commit to Vault
                <span class="material-symbols-outlined text-sm">database</span>
            </button>
        </div>
    </main>

    <!-- VAULT VIEW -->
    <main id="view-vault" class="max-w-4xl mx-auto px-4 py-10 pb-32 space-y-8 view-hidden animate-in no-print">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
            <div>
                <h2 class="font-headline text-4xl font-black uppercase tracking-tighter leading-none">Tag_Vault</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1" id="vault-status">Capacity: 0/1000 Records</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="exportExcel()" class="bg-emerald-600 text-white px-4 py-2.5 text-[10px] font-black uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-sm">table_view</span> Excel
                </button>
                <button onclick="printSelected()" class="bg-black text-white px-4 py-2.5 text-[10px] font-black uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-sm">print</span> Print (Max 50)
                </button>
                <button onclick="toggleSelectionAll()" class="border-2 border-black px-4 py-2 text-[10px] font-black uppercase tracking-widest active:bg-slate-100 transition-all">
                    Select All
                </button>
            </div>
        </div>

        <div id="vault-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Dynamic Injection -->
        </div>
    </main>

    <!-- Navigation (Mobile Only) -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-stretch bg-white border-t-2 border-black h-16 no-print">
        <button onclick="switchView('form')" class="flex-1 flex flex-col items-center justify-center">
            <span class="material-symbols-outlined">add_box</span>
            <span class="text-[8px] font-black uppercase mt-1">Generate</span>
        </button>
        <button onclick="switchView('vault')" class="flex-1 flex flex-col items-center justify-center border-l border-slate-100">
            <span class="material-symbols-outlined">inventory</span>
            <span class="text-[8px] font-black uppercase mt-1">Vault</span>
        </button>
    </nav>

    <script>
        const LOGO_URL = "https://i.supaimg.com/d0495ff2-7a2f-426d-a287-7b3b2861a5ee/2c62bf77-c549-4cfa-8c92-08a97bdef21b.jpg";
        const VAULT_LIMIT = 1000;
        let tags = JSON.parse(localStorage.getItem('calseva_tag_db') || '[]');
        let selectedTags = new Set();

        function switchView(view) {
            document.getElementById('view-form').classList.toggle('view-hidden', view !== 'form');
            document.getElementById('view-vault').classList.toggle('view-hidden', view !== 'vault');
            document.getElementById('nav-form').classList.toggle('tab-active', view === 'form');
            document.getElementById('nav-vault').classList.toggle('tab-active', view === 'vault');
            if(view === 'vault') renderVault();
            window.scrollTo(0,0);
        }

        function saveTag() {
            const tagNo = document.getElementById('tagNo').value;
            if(!tagNo) { showToast("Tag ID Required"); return; }

            const entry = {
                id: Date.now(),
                tagNo: tagNo.toUpperCase(),
                doneOn: document.getElementById('doneOn').value,
                dueOn: document.getElementById('dueOn').value,
                doneBy: document.getElementById('doneBy').value.toUpperCase(),
                timestamp: new Date().toLocaleString()
            };

            // If over limit, pop the oldest
            if(tags.length >= VAULT_LIMIT) tags.pop();
            tags.unshift(entry);
            localStorage.setItem('calseva_tag_db', JSON.stringify(tags));
            
            showToast("Tag synchronized to vault");
            resetForm();
            switchView('vault');
        }

        function resetForm() {
            document.getElementById('tagNo').value = '';
            document.getElementById('doneBy').value = '';
            document.getElementById('doneOn').valueAsDate = new Date();
            const nextYear = new Date();
            nextYear.setFullYear(nextYear.getFullYear() + 1);
            document.getElementById('dueOn').valueAsDate = nextYear;
        }

        function renderVault() {
            const container = document.getElementById('vault-list');
            document.getElementById('vault-status').innerText = `Capacity: ${tags.length}/${VAULT_LIMIT} Records`;
            
            if(tags.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-slate-300 font-black uppercase tracking-widest text-[10px]">No Records Found</div>`;
                return;
            }

            container.innerHTML = tags.map((t, i) => `
                <div class="bg-white border-2 border-black p-5 flex items-center gap-4 group relative ${selectedTags.has(t.id) ? 'bg-slate-50 border-accent' : ''}">
                    <input type="checkbox" ${selectedTags.has(t.id) ? 'checked' : ''} onchange="toggleSelect(${t.id})" class="w-5 h-5 border-2 border-black text-black focus:ring-0">
                    <div class="flex-grow">
                        <div class="text-[8px] font-black text-slate-400 mb-1">${t.id}</div>
                        <div class="text-sm font-black uppercase leading-none">${t.tagNo}</div>
                        <div class="text-[9px] font-bold text-slate-400 uppercase mt-2">DUE: ${t.dueOn}</div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="editRecord(${i})" class="w-8 h-8 flex items-center justify-center hover:bg-slate-100"><span class="material-symbols-outlined text-sm">edit</span></button>
                        <button onclick="deleteRecord(${i})" class="w-8 h-8 flex items-center justify-center hover:bg-red-50 text-red-600"><span class="material-symbols-outlined text-sm">delete</span></button>
                    </div>
                </div>
            `).join('');
        }

        function toggleSelect(id) {
            if(selectedTags.has(id)) selectedTags.delete(id);
            else selectedTags.add(id);
            renderVault();
        }

        function toggleSelectionAll() {
            if(selectedTags.size === tags.length) selectedTags.clear();
            else tags.forEach(t => selectedTags.add(t.id));
            renderVault();
        }

        function deleteRecord(idx) {
            const tagId = tags[idx].id;
            if(confirm("Terminate permanent tag record?")) {
                tags.splice(idx, 1);
                selectedTags.delete(tagId);
                localStorage.setItem('calseva_tag_db', JSON.stringify(tags));
                renderVault();
            }
        }

        function editRecord(idx) {
            const t = tags[idx];
            const newVal = prompt("Update Tag Number:", t.tagNo);
            if(newVal) {
                t.tagNo = newVal.toUpperCase();
                localStorage.setItem('calseva_tag_db', JSON.stringify(tags));
                renderVault();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        function exportExcel() {
            if(selectedTags.size === 0) { alert("Select records for export"); return; }
            
            const selectedData = tags.filter(t => selectedTags.has(t.id));
            let csv = "TAG NO,DONE ON,DUE ON,DONE BY,TIMESTAMP\n";
            selectedData.forEach(t => {
                csv += `${t.tagNo},${t.doneOn},${t.dueOn},${t.doneBy},${t.timestamp}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', `CALSEVA_TAG_EXPORT_${Date.now()}.csv`);
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function printSelected() {
            if(selectedTags.size === 0) { alert("Select records to print"); return; }
            if(selectedTags.size > 50) { alert("Batch limit: 50 tags per sheet"); return; }

            const printArea = document.getElementById('print-area');
            const selectedData = tags.filter(t => selectedTags.has(t.id));

            printArea.innerHTML = selectedData.map(t => `
                <div class="tag-card-print">
                    <div class="tag-header-container">
                        <img src="${LOGO_URL}" class="tag-logo-print" alt="Logo" onerror="this.style.display='none'">
                        <div class="tag-header-text">
                            CALSEVA INDUSTRIAL SOLUTIONS<br>
                            <span style="font-size: 8pt; opacity: 0.8;">Instrument Calibration Status</span>
                        </div>
                    </div>
                    
                    <div class="text-center font-bold text-[9pt] mb-2 uppercase italic border-b border-black pb-1">Indicating Instrument</div>
                    
                    <div class="tag-row"><span class="tag-label">INST. TAG NO.</span><span class="tag-val">: ${t.tagNo}</span></div>
                    <div class="tag-row"><span class="tag-label">CALIB. DONE ON</span><span class="tag-val">: ${t.doneOn}</span></div>
                    <div class="tag-row"><span class="tag-label">CALIB. DUE ON</span><span class="tag-val">: ${t.dueOn}</span></div>
                    <div class="tag-row border-b-0"><span class="tag-label">CALIB. DONE BY</span><span class="tag-val">: ${t.doneBy}</span></div>
                    
                    <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: flex-end;">
                        <div style="font-size: 6pt; color: #666;">ID: ${t.id}</div>
                        <div style="text-align: right; font-size: 8pt; font-weight: bold;">Verified by: ________________</div>
                    </div>
                </div>
            `).join('');

            setTimeout(() => {
                window.print();
            }, 500);
        }

        window.onload = resetForm;
    </script>
</body>
</html>
