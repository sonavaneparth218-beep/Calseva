<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>Attendance Tracking | CALSEVA</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Fixed Material Symbols Library Link -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "on-primary": "#ffffff",
                        "surface": "#f9f9f9",
                        "outline": "#777777",
                        "accent": "#ba1a1a"
                    },
                    fontFamily: {
                        "headline": ["League Spartan", "sans-serif"],
                        "body": ["Montserrat", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body { 
            font-family: 'Montserrat', sans-serif; 
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }
        .font-headline { font-family: 'League Spartan', sans-serif; }

        @keyframes lineGrow {
            0% { width: 0; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0; left: 100%; }
        }
        .loader-line {
            height: 2px;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        .loader-line::after {
            content: '';
            position: absolute;
            height: 100%;
            background: #fff;
            animation: lineGrow 1.5s infinite ease-in-out;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            main { margin: 0; padding: 20px; max-width: none; }
            .print-only { display: block !important; }
            .calendar-grid { gap: 0; border: 1px solid #000; }
            .calendar-day { border: 1px solid #eee; height: 80px !important; }
            .card { border: 1px solid #eee; box-shadow: none !important; }
        }

        .calendar-day { transition: all 0.2s ease; cursor: pointer; }
        .calendar-day.present { background-color: #000 !important; color: #fff !important; border-color: #000; }
        .calendar-day.today { border: 2px solid #000; }
        
        input:focus { outline: none; border-color: #000 !important; ring: 0 !important; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-surface text-primary min-h-screen pb-24 overflow-x-hidden">

    <div id="globalLoader" class="fixed inset-0 z-[100] hidden flex flex-col items-center justify-center bg-black/95 backdrop-blur-md">
        <div class="w-64 space-y-6 text-center">
            <span class="font-headline font-black text-white text-xl tracking-[0.4em] uppercase">Synchronizing</span>
            <div class="loader-line w-full"></div>
            <p class="text-white/40 text-[10px] font-bold tracking-widest uppercase">Encryption Checksum Verification...</p>
        </div>
    </div>

    <header class="sticky top-0 z-50 bg-white border-b border-black/5 px-4 md:px-6 py-4 flex justify-between items-center no-print">
        <div class="flex items-center gap-3">
            <button class="w-10 h-10 flex items-center justify-center hover:bg-slate-50 transition-colors">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <h1 class="font-headline font-black tracking-tighter uppercase text-lg md:text-xl">Attendance_Log</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="syncToDB()" class="px-3 md:px-4 py-2 bg-black text-white text-[9px] md:text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 active:scale-95 transition-all">
                Save
            </button>
            <button onclick="window.print()" class="px-3 md:px-4 py-2 border-2 border-black text-[9px] md:text-[10px] font-black uppercase tracking-widest hover:bg-black hover:text-white active:scale-95 transition-all">
                Print
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6 pt-6 md:pt-10">
        <section class="mb-10 md:mb-12 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
            <div>
                <h2 class="font-headline font-black text-5xl md:text-8xl tracking-tighter uppercase leading-none">Monthly<br><span id="hero-month">Report</span></h2>
                <div class="w-16 md:w-24 h-1.5 md:h-2 bg-black mt-4 md:mt-6"></div>
            </div>
            <div class="flex gap-6 md:gap-8 w-full md:w-auto justify-between md:justify-end border-t md:border-t-0 pt-4 md:pt-0">
                <div class="text-left md:text-right">
                    <p class="text-[9px] md:text-[10px] font-bold text-outline uppercase tracking-widest mb-1">Log Status</p>
                    <p class="font-headline font-black text-3xl md:text-4xl uppercase" id="summary-status">Active</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] md:text-[10px] font-bold text-outline uppercase tracking-widest mb-1">Present Count</p>
                    <p class="font-headline font-black text-3xl md:text-4xl" id="summary-count">0</p>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
            <div class="lg:col-span-8 space-y-6 md:space-y-8">
                <div class="bg-black text-white p-6 md:p-8 no-print shadow-xl">
                    <div class="flex flex-col md:flex-row gap-4 md:gap-6 items-stretch md:items-end">
                        <div class="flex-grow space-y-2">
                            <label class="text-[9px] md:text-[10px] font-bold uppercase tracking-widest opacity-60">Logging Date (System Verification)</label>
                            <input type="date" id="log-date" class="w-full bg-white/10 border-white/20 text-white p-4 font-bold focus:border-white transition-all rounded-none appearance-none">
                        </div>
                        <button onclick="logAttendance()" class="bg-white text-black py-4 px-8 font-headline font-black uppercase tracking-widest text-xs hover:bg-neutral-200 transition-all flex items-center justify-center gap-3 active:scale-95 h-[58px]">
                            Set Attendance
                            <span class="material-symbols-outlined text-sm">qr_code_2</span>
                        </button>
                    </div>
                </div>

                <div class="bg-white border border-black/5 p-4 md:p-6">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                        <div class="flex items-center gap-4">
                            <h3 id="calendar-title" class="font-headline font-black text-xl md:text-2xl uppercase tracking-tight">Cycle Log</h3>
                            <div class="flex gap-1 no-print">
                                <button onclick="changeMonth(-1)" class="p-1 hover:bg-slate-100"><span class="material-symbols-outlined text-sm">chevron_left</span></button>
                                <button onclick="changeMonth(1)" class="p-1 hover:bg-slate-100"><span class="material-symbols-outlined text-sm">chevron_right</span></button>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <div class="flex items-center gap-2"><div class="w-3 h-3 bg-black"></div><span class="text-[8px] font-bold uppercase tracking-widest text-slate-500">Present</span></div>
                            <div class="flex items-center gap-2"><div class="w-3 h-3 bg-slate-100 border border-slate-200"></div><span class="text-[8px] font-bold uppercase tracking-widest text-slate-500">Null</span></div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-7 gap-px bg-slate-200 border border-slate-200 calendar-grid">
                        <div class="bg-slate-50 py-3 text-center text-[8px] font-black uppercase tracking-widest text-slate-400">Sun</div>
                        <div class="bg-slate-50 py-3 text-center text-[8px] font-black uppercase tracking-widest text-slate-400">Mon</div>
                        <div class="bg-slate-50 py-3 text-center text-[8px] font-black uppercase tracking-widest text-slate-400">Tue</div>
                        <div class="bg-slate-50 py-3 text-center text-[8px] font-black uppercase tracking-widest text-slate-400">Wed</div>
                        <div class="bg-slate-50 py-3 text-center text-[8px] font-black uppercase tracking-widest text-slate-400">Thu</div>
                        <div class="bg-slate-50 py-3 text-center text-[8px] font-black uppercase tracking-widest text-slate-400">Fri</div>
                        <div class="bg-slate-50 py-3 text-center text-[8px] font-black uppercase tracking-widest text-slate-400">Sat</div>
                        <div id="calendar-days" class="contents"></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6 no-print">
                <div class="flex justify-between items-end border-b-2 border-black pb-2">
                    <h3 class="font-headline font-black text-xl uppercase tracking-tighter">Recent Logs</h3>
                    <span class="text-[9px] font-bold text-outline uppercase" id="log-stat">0 Records</span>
                </div>
                
                <div id="logs-container" class="space-y-3 pb-8 lg:pb-0">
                    <div id="empty-state" class="py-16 md:py-20 text-center border-2 border-dashed border-slate-200 bg-slate-50/50">
                        <span class="material-symbols-outlined text-slate-300 text-4xl mb-2">inventory_2</span>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Awaiting personnel credentials</p>
                    </div>
                </div>
            </div>
        </div>
    </main>



    <script>
        let attendanceData = []; // Array of { year, month, day, id, time, loc }
        let currentViewDate = new Date();

        const monthNames = ["January", "February", "March", "April", "May", "June",
          "July", "August", "September", "October", "November", "December"
        ];

        function initCalendar() {
            const container = document.getElementById('calendar-days');
            container.innerHTML = '';
            
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            
            document.getElementById('calendar-title').innerText = `${monthNames[month]} ${year}`;
            document.getElementById('hero-month').innerText = `${monthNames[month]}`;

            // Calculate first day of month and number of days
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Render empty slots for start of month
            for (let i = 0; i < firstDay; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'bg-slate-50 h-16 md:h-24 border-black/5';
                container.appendChild(emptyDiv);
            }

            // Render active days
            for (let i = 1; i <= daysInMonth; i++) {
                const isPresent = attendanceData.some(d => d.day === i && d.month === month && d.year === year);
                const isToday = new Date().toDateString() === new Date(year, month, i).toDateString();
                
                const dayDiv = document.createElement('div');
                dayDiv.className = `calendar-day bg-white h-16 md:h-24 p-2 md:p-3 flex flex-col justify-between border-black/5 ${isPresent ? 'present' : ''} ${isToday ? 'today' : ''}`;
                dayDiv.innerHTML = `
                    <span class="text-[10px] md:text-xs font-black">${i}</span>
                    ${isPresent ? '<span class="material-symbols-outlined text-sm md:text-md">check_box</span>' : ''}
                `;
                container.appendChild(dayDiv);
            }
            
            updateSummary();
        }

        function changeMonth(delta) {
            currentViewDate.setMonth(currentViewDate.getMonth() + delta);
            initCalendar();
            renderLogs();
        }

        function updateSummary() {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const currentMonthLogs = attendanceData.filter(d => d.month === month && d.year === year);
            
            document.getElementById('summary-count').innerText = currentMonthLogs.length;
            document.getElementById('log-stat').innerText = `${currentMonthLogs.length} Records`;
            
            const emptyState = document.getElementById('empty-state');
            if (currentMonthLogs.length > 0) {
                emptyState?.classList.add('hidden');
            } else {
                emptyState?.classList.remove('hidden');
            }
        }

        async function logAttendance() {
            const dateInput = document.getElementById('log-date');
            if (!dateInput.value) return;

            const selectedDate = new Date(dateInput.value);
            const year = selectedDate.getFullYear();
            const month = selectedDate.getMonth();
            const day = selectedDate.getDate();
            
            if (attendanceData.some(d => d.day === day && d.month === month && d.year === year)) {
                alert("Credentials already synchronized for this specific date.");
                return;
            }

            const loader = document.getElementById('globalLoader');
            loader.classList.remove('hidden');

            // Simulate 2s sync
            await new Promise(resolve => setTimeout(resolve, 2000));

            const record = {
                id: 'CS-' + Math.random().toString(36).substr(2, 5).toUpperCase(),
                year: year,
                month: month,
                day: day,
                date: dateInput.value,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }),
                loc: 'Main Gate 04'
            };

            attendanceData.push(record);
            
            // Automatically switch view to the logged date month
            currentViewDate = new Date(year, month, 1);
            
            renderLogs();
            initCalendar();
            loader.classList.add('hidden');
        }

        function renderLogs() {
            const container = document.getElementById('logs-container');
            const items = container.querySelectorAll('.log-item');
            items.forEach(i => i.remove());

            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const currentMonthLogs = attendanceData.filter(d => d.month === month && d.year === year);

            currentMonthLogs.sort((a, b) => b.day - a.day).forEach(log => {
                const div = document.createElement('div');
                div.className = "log-item bg-slate-50 p-4 md:p-5 flex items-center justify-between border border-black/5 animate-slide-up group";
                div.innerHTML = `
                    <div class="flex items-center gap-3 md:gap-4">
                        <div class="w-8 h-8 md:w-10 md:h-10 bg-black text-white flex items-center justify-center shrink-0">
                            <span class="text-[10px] font-black">${log.day}</span>
                        </div>
                        <div>
                            <p class="text-[8px] md:text-[9px] font-bold text-outline uppercase tracking-widest">${log.id}</p>
                            <p class="font-bold text-xs md:text-sm">${log.time}</p>
                            <p class="text-[8px] md:text-[9px] font-medium text-slate-400 uppercase">${log.loc}</p>
                        </div>
                    </div>
                    <div class="flex gap-1 md:gap-2 md:opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="editLog('${log.id}')" class="p-2 bg-white md:bg-transparent border md:border-0 border-slate-200 hover:bg-black hover:text-white transition-all flex items-center justify-center">
                            <span class="material-symbols-outlined text-[18px]">edit_note</span>
                        </button>
                        <button onclick="deleteLog('${log.id}')" class="p-2 bg-white md:bg-transparent border md:border-0 border-slate-200 hover:bg-accent hover:text-white transition-all flex items-center justify-center">
                            <span class="material-symbols-outlined text-[18px]">delete</span>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
            updateSummary();
        }

        function deleteLog(id) {
            if (confirm("Terminate record entry?")) {
                attendanceData = attendanceData.filter(l => l.id !== id);
                renderLogs();
                initCalendar();
            }
        }

        function editLog(id) {
            const log = attendanceData.find(l => l.id === id);
            const newLoc = prompt("Personnel Relocation Hub:", log.loc);
            if (newLoc) {
                log.loc = newLoc;
                renderLogs();
            }
        }

        async function syncToDB() {
            const loader = document.getElementById('globalLoader');
            loader.classList.remove('hidden');
            await new Promise(resolve => setTimeout(resolve, 2500));
            loader.classList.add('hidden');
            alert("External Database Synchronization Successful.");
        }

        // Init today's date and calendar
        document.getElementById('log-date').valueAsDate = new Date();
        initCalendar();
    </script>
</body>
</html>
